spring:
  application:
    name: high-performance-api
  
  datasource:
    url: jdbc:postgresql://localhost:5432/tasksdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION:60000}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  cache:
    type: ${CACHE_TYPE:simple}
    cache-names: tasks, taskStats
    redis:
      time-to-live: 600000
  
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

server:
  port: 8081
  compression:
    enabled: true
  # Security: Remove server header
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    indicators:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: false
  show-actuator: false

jwt:
  secret: ${JWT_SECRET:} # REQUIRED: Must be set via environment variable in production
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in milliseconds

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080} # Comma-separated list
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
  allowed-headers: "*"
  exposed-headers: Authorization,Content-Type,X-Refresh-Token
  max-age: 3600
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}


logging:
  level:
    com.leonardoborges.api: INFO
    com.leonardoborges.api.service: INFO
    com.leonardoborges.api.controller: INFO
    com.leonardoborges.api.util: DEBUG
    com.leonardoborges.api.security: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: WARN
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"