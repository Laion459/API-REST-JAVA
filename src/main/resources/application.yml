spring:
  application:
    name: high-performance-api
  
  datasource:
    url: jdbc:postgresql://localhost:5432/tasksdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  cache:
    type: ${CACHE_TYPE:simple}
    cache-names: tasks, taskStats
    redis:
      time-to-live: 600000
  
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

server:
  port: 8081
  compression:
    enabled: true
  # Security: Remove server header
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    indicators:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: false
  show-actuator: false

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-must-be-at-least-32-characters-long-for-security}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

logging:
  level:
    com.leonardoborges.api: INFO
    com.leonardoborges.api.service: INFO
    com.leonardoborges.api.controller: INFO
    com.leonardoborges.api.util: DEBUG
    com.leonardoborges.api.security: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: WARN
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"