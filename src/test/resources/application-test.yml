spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cache:
    type: simple
  redis:
    host: localhost
    port: 6379

app:
  metrics:
    enabled: false

logging:
  level:
    com.leonardoborges.api: DEBUG
    org.springframework: WARN
