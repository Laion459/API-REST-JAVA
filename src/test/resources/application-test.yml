spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:}
  cache:
    type: simple
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
  main:
    allow-bean-definition-overriding: true
  # Exclude Spring Security web autoconfiguration for tests
  # This is the recommended approach per Spring Boot best practices
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

app:
  metrics:
    enabled: false

jwt:
  secret: test-secret-key-for-testing-purposes-only-minimum-32-chars
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.leonardoborges.api: DEBUG
    org.springframework: WARN
